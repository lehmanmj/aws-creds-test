name: 111aaa static new test
on: workflow_dispatch

jobs:
    static_assumeRole:
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event.pull_request.user.login == 'aws-sdk-osds' && github.repository == 'aws-actions/configure-aws-credentials') }}
        permissions:
            id-token: write
        strategy: 
            fail-fast: false
            #matrix:
                #os: [windows-latest, ubuntu-latest, macos-latest]
        #runs-on: ${{ matrix.os }}
        runs-on: ubuntu-latest
        name: Static IAM creds test
        steps:
            #UNCOMMENT THIS ONE
        #- name: checkout
            #uses: actions/checkout@v5
            #with:
                #fetch-depth: 0
                #persist-credentials: false
          - name: assume creator Role
            #uses: ./
            uses: aws-actions/configure-aws-credentials@v6 #REPLACE THIS
            with:
                aws-region: us-west-2
                role-to-assume: ${{ secrets.STATIC_USER_CREATION_ROLE }}

          - name: random number for username
            run: echo "USER_NUM=$RANDOM" >> $GITHUB_ENV

          - name: create user
            run: aws iam create-user --user-name static-creds-integ-test-user-${{ env.USER_NUM }}

          - name: delete user
            run: aws iam delete-user --user-name static-creds-integ-test-user-${{ env.USER_NUM}}
