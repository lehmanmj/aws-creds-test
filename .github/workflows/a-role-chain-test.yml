name: AAAA oidc role chain
on: 
    workflow_dispatch:

permissions:
    id-token: write
jobs:
  run_job_with_aws:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@jfeddern-feat/multiple-profiles
        with:
            aws-region: us-east-1
            role-to-assume: arn:aws:iam::884348119369:role/first-role-to-test
            role-session-name: MySessionName
            retry-max-attempts: 6
            aws-profile: firstRoleInChain
            output-env-credentials: false
      - name: assume second role
        uses: aws-actions/configure-aws-credentials@jfeddern-feat/multiple-profiles
        with:
            aws-region: us-east-2
            role-to-assume: arn:aws:iam::884348119369:role/second-role-to-test
            role-session-name: MySessionName
            role-chaining: true
            retry-max-attempts: 6
            aws-profile: secondRoleInChain
            #output-env-credentials: false
      - name: get caller identity
        run: |
          aws sts get-caller-identity --profile firstRoleInChain
          aws sts get-caller-identity --profile secondRoleInChain