name: 1AAAA Issue 1898 test
on: 
    workflow_dispatch:
    pull_request:

permissions:
    id-token: write
jobs:
  run_job_with_aws:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
            aws-region: us-east-2
            role-to-assume: arn:aws:iam::884348119369:role/first-role-to-test
            retry-max-attempts: 6
      - name: assume second role
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
            aws-region: us-east-2
            role-to-assume: arn:aws:iam::884348119369:role/second-role-to-test
            role-chaining: true
            retry-max-attempts: 6
      - name: get caller identity
        run: |
          aws sts get-caller-identity 